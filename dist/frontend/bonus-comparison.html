<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonus Comparison - iGaming Security Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #111827 0%, #1f2937 100%); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 14px 28px rgba(15, 23, 42, 0.08); }
        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.24);
        }
        .level-bar {
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            background: #e5e7eb;
        }
        .level-fill {
            height: 100%;
            transition: width 0.5s ease;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="gradient-bg text-white py-8 shadow-lg">
        <div class="container mx-auto px-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-6">
                    <div class="w-16 h-16 bg-white bg-opacity-20 rounded-xl flex items-center justify-center backdrop-blur-sm">
                        <i data-lucide="percent" class="w-10 h-10"></i>
                    </div>
                    <div>
                        <h1 class="text-4xl font-bold tracking-tight">Bonus Comparison Tool</h1>
                        <p class="text-slate-200 text-lg mt-1">Analyze and compare competitors' bonus systems</p>
                        <p class="text-slate-300 text-sm mt-1">Brand setup: suratbet · Redirect: https://t2m.io/telg · jelibon marketing</p>
                    </div>
                </div>
                <a href="index.html" class="btn-primary px-6 py-3 rounded-lg font-medium inline-flex items-center space-x-2">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    <span>Dashboard</span>
                </a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-8">
        <!-- Comparison Form -->
        <div class="bg-white rounded-xl p-8 shadow-xl mb-8">
            <div class="flex items-center space-x-3 mb-6">
                <div class="w-12 h-12 bg-gradient-to-br from-green-500 to-emerald-600 rounded-lg flex items-center justify-center">
                    <i data-lucide="settings" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-bold text-gray-900">Configure Comparison</h2>
                    <p class="text-gray-600">Enter your brand and competitor information</p>
                </div>
            </div>

            <!-- Your Brand Info -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">
                        <i data-lucide="building" class="w-4 h-4 inline mr-1"></i>
                        Your Brand Name
                    </label>
                    <input id="brandInput" type="text" placeholder="e.g., suratbet" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 transition-colors">
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">
                        <i data-lucide="link" class="w-4 h-4 inline mr-1"></i>
                        Your Website URL (Optional)
                    </label>
                    <input id="baseUrlInput" type="url" placeholder="https://t2m.io/telg" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 transition-colors">
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">
                        <i data-lucide="languages" class="w-4 h-4 inline mr-1"></i>
                        Content Language
                    </label>
                    <select id="languageInput" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 transition-colors">
                        <option value="tr" selected>Turkish (Türkçe)</option>
                        <option value="auto">Auto Detect</option>
                        <option value="en">English</option>
                    </select>
                </div>
            </div>

            <!-- Competitors Section -->
            <div class="mb-6">
                <div class="flex items-center justify-between mb-4">
                    <label class="block text-sm font-medium text-gray-700">
                        <i data-lucide="users" class="w-4 h-4 inline mr-1"></i>
                        Competitors to Compare
                    </label>
                    <button onclick="addRow()" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg font-medium transition-colors inline-flex items-center space-x-2">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i>
                        <span>Add Competitor</span>
                    </button>
                </div>
                <div id="competitors" class="space-y-3"></div>
            </div>

            <!-- Action Buttons -->
            <div class="flex items-center space-x-4">
                <button onclick="runBonusComparison()" class="btn-primary px-8 py-3 text-white rounded-lg font-semibold inline-flex items-center space-x-2">
                    <i data-lucide="play" class="w-5 h-5"></i>
                    <span>Start Comparison</span>
                </button>
                <button onclick="clearForm()" class="px-8 py-3 bg-gray-200 hover:bg-gray-300 rounded-lg font-semibold transition-colors inline-flex items-center space-x-2">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                    <span>Clear Form</span>
                </button>
            </div>
        </div>

        <!-- Results Section -->
        <div id="results" class="hidden"></div>
    </main>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl p-8 flex flex-col items-center space-y-4">
            <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-green-600"></div>
            <span class="text-gray-700 font-medium text-lg">Analyzing bonuses...</span>
            <span class="text-gray-500 text-sm">This may take a moment</span>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function showLoading() {
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        function addRow() {
            const container = document.getElementById('competitors');
            const idx = container.children.length + 1;
            const div = document.createElement('div');
            div.className = 'grid grid-cols-1 md:grid-cols-12 gap-3 items-center bg-gray-50 p-4 rounded-lg';
            div.innerHTML = `
                <div class="md:col-span-5">
                    <input type="text" placeholder="Competitor ${idx} Name" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
                </div>
                <div class="md:col-span-6">
                    <input type="url" placeholder="https://competitor${idx}.com" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
                </div>
                <div class="md:col-span-1 flex justify-center">
                    <button onclick="this.closest('.grid').remove()" 
                            class="w-8 h-8 bg-red-100 hover:bg-red-200 rounded-lg flex items-center justify-center transition-colors">
                        <i data-lucide="x" class="w-4 h-4 text-red-600"></i>
                    </button>
                </div>
            `;
            container.appendChild(div);
            lucide.createIcons();
        }

        function clearForm() {
            document.getElementById('brandInput').value = '';
            document.getElementById('baseUrlInput').value = '';
            document.getElementById('languageInput').value = 'tr';
            document.getElementById('competitors').innerHTML = '';
            document.getElementById('results').classList.add('hidden');
            addRow();
        }

        function renderResults(data) {
            const el = document.getElementById('results');
            el.classList.remove('hidden');
            
            const results = data.results || [];
            const sideBySide = data.sideBySide || [];
            
            let html = `
                <div class="bg-white rounded-xl p-8 shadow-xl">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-2xl font-bold text-gray-900 flex items-center">
                            <i data-lucide="bar-chart" class="w-6 h-6 mr-3 text-green-600"></i>
                            Comparison Results
                        </h3>
                        <div class="flex items-center space-x-3">
                            ${data.csvPath ? `<a href="${data.csvPath}" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors inline-flex items-center space-x-2" download>
                                <i data-lucide="download" class="w-4 h-4"></i>
                                <span>Download CSV</span>
                            </a>` : ''}
                            ${data.pdfPath ? `<a href="${data.pdfPath}" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors inline-flex items-center space-x-2" download>
                                <i data-lucide="file-text" class="w-4 h-4"></i>
                                <span>Download PDF</span>
                            </a>` : ''}
                </div>
                </div>
            `;

            if (sideBySide.length > 0) {
                html += `
                    <div class="mb-8 overflow-x-auto">
                        <h4 class="text-lg font-bold text-gray-900 mb-3">Side-by-Side Bonus Matrix</h4>
                        <table class="min-w-full border border-gray-200 rounded-lg overflow-hidden">
                            <thead class="bg-gray-100">
                                <tr>
                                    <th class="text-left px-4 py-3 text-sm font-semibold text-gray-700">Site</th>
                                    <th class="text-left px-4 py-3 text-sm font-semibold text-gray-700">Welcome Bonus</th>
                                    <th class="text-left px-4 py-3 text-sm font-semibold text-gray-700">Wagering</th>
                                    <th class="text-left px-4 py-3 text-sm font-semibold text-gray-700">Max Cashout</th>
                                    <th class="text-left px-4 py-3 text-sm font-semibold text-gray-700">Offers</th>
                                    <th class="text-left px-4 py-3 text-sm font-semibold text-gray-700">Lang</th>
                                    <th class="text-left px-4 py-3 text-sm font-semibold text-gray-700">Confidence</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">
                                ${sideBySide.map(row => `
                                    <tr class="hover:bg-gray-50">
                                        <td class="px-4 py-3 text-sm font-semibold text-gray-900">${row.name}</td>
                                        <td class="px-4 py-3 text-sm text-gray-700">${row.welcomeBonus || 'N/A'}</td>
                                        <td class="px-4 py-3 text-sm text-gray-700">${row.wagering || 'N/A'}</td>
                                        <td class="px-4 py-3 text-sm text-gray-700">${row.maxCashout || 'N/A'}</td>
                                        <td class="px-4 py-3 text-sm text-gray-700">${row.offerCount || 0}</td>
                                        <td class="px-4 py-3 text-sm text-gray-700">${row.language || 'unknown'}</td>
                                        <td class="px-4 py-3 text-sm text-gray-700">${row.confidence || 0}%</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }

            if (results.length === 0) {
                html += `
                    <div class="text-center py-12">
                        <i data-lucide="alert-circle" class="w-16 h-16 text-gray-400 mx-auto mb-4"></i>
                        <p class="text-gray-600 text-lg">No comparison data available</p>
                    </div>
                `;
            } else {
                html += `<div class="grid grid-cols-1 gap-6">`;
                
                results.forEach((result, index) => {
                    const ratingPercent = (parseFloat(result.rating) / 5) * 100;
                    const wageringNum = parseInt(String(result.wagering || '').replace('x', ''), 10);
                    const safeWageringNum = Number.isFinite(wageringNum) ? wageringNum : 50;
                    const wageringColor = safeWageringNum <= 30 ? 'bg-green-500' : safeWageringNum <= 40 ? 'bg-yellow-500' : 'bg-red-500';
                    
                    html += `
                        <div class="border border-gray-200 rounded-lg p-6 hover:shadow-lg transition-shadow">
                            <div class="flex items-start justify-between mb-4">
                                <div class="flex-1">
                                    <h4 class="text-xl font-bold text-gray-900 mb-2">${result.name}</h4>
                                    <a href="${result.url}" target="_blank" class="text-sm text-blue-600 hover:underline flex items-center space-x-1">
                                        <i data-lucide="external-link" class="w-4 h-4"></i>
                                        <span>${result.url}</span>
                                    </a>
                                </div>
                                <div class="text-right">
                                    <div class="text-3xl font-bold text-green-600">${result.welcomeBonus}</div>
                                    <div class="text-xs text-gray-600">Welcome Bonus</div>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                <div class="bg-gray-50 p-4 rounded-lg">
                                    <div class="text-sm text-gray-600 mb-2">Wagering Requirement</div>
                                    <div class="text-2xl font-bold text-gray-900">${result.wagering}</div>
                                    <div class="level-bar mt-2">
                                        <div class="level-fill ${wageringColor}" style="width: ${Math.min((safeWageringNum / 50) * 100, 100)}%"></div>
                                    </div>
                                </div>
                                <div class="bg-gray-50 p-4 rounded-lg">
                                    <div class="text-sm text-gray-600 mb-2">Max Cashout</div>
                                    <div class="text-2xl font-bold text-gray-900">${result.maxCashout}</div>
                                </div>
                                <div class="bg-gray-50 p-4 rounded-lg">
                                    <div class="text-sm text-gray-600 mb-2">Overall Rating</div>
                                    <div class="text-2xl font-bold text-gray-900 mb-2">${result.rating}/5.0</div>
                                    <div class="level-bar">
                                        <div class="level-fill bg-yellow-500" style="width: ${ratingPercent}%"></div>
                                    </div>
                                </div>
                            </div>

                            ${Array.isArray(result.offers) && result.offers.length ? `
                                <div class="mt-3 p-4 bg-gray-50 rounded-lg">
                                    <div class="text-sm font-semibold text-gray-800 mb-2">Detected Turkish Bonus Signals</div>
                                    <ul class="space-y-1 text-sm text-gray-700">
                                        ${result.offers.slice(0, 4).map(offer => `
                                            <li>• ${offer.title}</li>
                                        `).join('')}
                                    </ul>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                
                html += `</div>`;
            }

            html += `</div>`;
            el.innerHTML = html;
            lucide.createIcons();
        }

        async function runBonusComparison() {
            const brand = document.getElementById('brandInput').value.trim();
            const baseUrl = document.getElementById('baseUrlInput').value.trim();
            const language = document.getElementById('languageInput').value;
            const competitors = Array.from(document.querySelectorAll('#competitors .grid'))
                .map(g => {
                    const inputs = g.querySelectorAll('input');
                    return { 
                        name: (inputs[0]?.value || '').trim(), 
                        url: (inputs[1]?.value || '').trim() 
                    };
                })
                .filter(x => x.name && x.url);

            if (competitors.length === 0) {
                alert('Please add at least one competitor with both name and URL.');
                return;
            }

            showLoading();
            try {
                const res = await fetch('/api/igaming/bonus-comparison', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        brand: brand || 'My Brand', 
                        baseUrl: baseUrl || null, 
                        competitors,
                        language
                    })
                });
                
                if (!res.ok) {
                    throw new Error(`Server returned ${res.status}`);
                }
                
                const data = await res.json();
                renderResults(data);
            } catch (e) {
                console.error('Bonus comparison error:', e);
                alert('Bonus comparison failed. Please check your inputs and try again.');
            } finally {
                hideLoading();
            }
        }

        // Initialize with one row
        addRow();
    </script>
</body>
</html>
